<div class="container create-skill-surface" data-create-skill-surface>
	<div class="create-help-card" aria-label="Need help">
		<span>Need help?</span>
		<button class="create-help-button" type="button" data-create-support-button>Support</button>
	</div>

	<div class="create-design-nav" data-create-design-nav>
		<button class="create-design-back" type="button" aria-label="Back" data-create-design-back>
			<svg viewBox="0 0 16 16" focusable="false" aria-hidden="true">
				<path d="M10 3.5 5.5 8 10 12.5" />
			</svg>
		</button>

		<div class="create-design-progress-wrap">
			<span class="create-design-progress-label" data-create-design-progress-label>Step 1 of 3</span>
			<div class="create-design-progress" aria-label="Design flow progress">
				<span class="create-design-progress-step is-active" data-create-design-progress-step="0"></span>
				<span class="create-design-progress-step" data-create-design-progress-step="1"></span>
				<span class="create-design-progress-step" data-create-design-progress-step="2"></span>
			</div>
		</div>

		<button class="create-design-skip" type="button" data-create-design-skip>Skip</button>
	</div>

	<div class="create-main">
		<div class="create-hero">
			<img class="create-hero-logo" src="{{CREATE_LOGO_URI}}" width="199" height="199" alt="My Skills" decoding="async" draggable="false">
		</div>

		<div class="create-mode-panel is-active" data-create-mode-panel="create">
			<!-- CREATE_MODE_PANEL -->
		</div>

		<div class="create-mode-panel" data-create-mode-panel="search" hidden>
			<!-- SEARCH_MODE_PANEL -->
		</div>

		<div class="create-mode-panel" data-create-mode-panel="design" hidden>
			<!-- DESIGN_MODE_PANEL -->
		</div>
	</div>

	<div class="create-category-container" data-create-category-container>
		<div class="create-category-branches create-category-branches--top" data-create-category-branches-top>
			<div class="create-category-branch" data-category-id="web">
				<span class="create-category-chip">Web</span>
			</div>
			<div class="create-category-branch" data-category-id="mobile">
				<span class="create-category-chip">Mobile</span>
			</div>
			<div class="create-category-branch" data-category-id="backend">
				<span class="create-category-chip">Backend</span>
			</div>
			<div class="create-category-branch" data-category-id="frontend">
				<span class="create-category-chip">Frontend</span>
			</div>
			<div class="create-category-branch" data-category-id="security">
				<span class="create-category-chip">Security</span>
			</div>
			<div class="create-category-branch" data-category-id="testing">
				<span class="create-category-chip">Testing</span>
			</div>
			<div class="create-category-branch" data-category-id="ai">
				<span class="create-category-chip">AI</span>
			</div>
		</div>

		<div class="create-category-branches create-category-branches--bottom" data-create-category-branches-bottom hidden>
		</div>
	</div>

	<div class="create-flow-status" aria-label="Create skill progress" data-create-flow-status>
		<div class="create-flow-card" data-create-flow-card="name">
			<span class="create-flow-icon" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M4 2.5h5.25L12 5.25v8.25H4z" />
					<path d="M9 2.75V5.5h2.75" />
				</svg>
			</span>
			<span class="create-flow-copy">
				<span class="create-flow-label">Skill name</span>
				<span class="create-flow-value" data-create-flow-name>—</span>
			</span>
			<span class="create-flow-check" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M3.5 8.25 6.4 11 12.5 5" />
				</svg>
			</span>
			<span class="create-flow-edit" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="m4.25 10.75-.75 2.75 2.75-.75 6.25-6.25-2-2z" />
					<path d="m9.5 5.5 2 2" />
				</svg>
			</span>
		</div>

		<div class="create-flow-card is-active" data-create-flow-card="category">
			<span class="create-flow-icon" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M3.5 4.5h4v4h-4z" />
					<path d="M8.5 4.5h4v4h-4z" />
					<path d="M3.5 9.5h4v2.5h-4z" />
					<path d="M8.5 9.5h4v2.5h-4z" />
				</svg>
			</span>
			<span class="create-flow-copy">
				<span class="create-flow-label">Category</span>
				<span class="create-flow-value" data-create-flow-category>Select one technology</span>
			</span>
			<span class="create-flow-caret" aria-hidden="true"></span>
			<span class="create-flow-check" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M3.5 8.25 6.4 11 12.5 5" />
				</svg>
			</span>
			<span class="create-flow-edit" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="m4.25 10.75-.75 2.75 2.75-.75 6.25-6.25-2-2z" />
					<path d="m9.5 5.5 2 2" />
				</svg>
			</span>
		</div>

		<div class="create-flow-card" data-create-flow-card="description">
			<span class="create-flow-icon" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M4 3.5h8" />
					<path d="M4 6.5h8" />
					<path d="M4 9.5h5" />
					<path d="M4 12.5h7" />
				</svg>
			</span>
			<span class="create-flow-copy">
				<span class="create-flow-label">Description</span>
				<span class="create-flow-value" data-create-flow-description>Add context to your new skill</span>
			</span>
			<span class="create-flow-caret" aria-hidden="true"></span>
			<span class="create-flow-check" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="M3.5 8.25 6.4 11 12.5 5" />
				</svg>
			</span>
			<span class="create-flow-edit" aria-hidden="true">
				<svg viewBox="0 0 16 16" focusable="false">
					<path d="m4.25 10.75-.75 2.75 2.75-.75 6.25-6.25-2-2z" />
					<path d="m9.5 5.5 2 2" />
				</svg>
			</span>
		</div>
	</div>

	<!-- CHAT_DOCK_PANEL -->

	<!-- NAME_PROMPT_PANEL -->

	<!-- LOADING_SCREEN_PANEL -->
	<div class="create-loading-screen" data-create-loading-screen hidden>
		<div class="create-loading-panel">
			<div class="create-loading-steps" data-create-loading-steps>
				<div class="create-loading-step" data-loading-step="name">
					<div class="create-loading-indicator">
						<span class="create-loading-spinner"></span>
						<svg class="create-loading-check" viewBox="0 0 16 16" focusable="false" aria-hidden="true">
							<circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
							<path d="M4.5 8.5l2 2 5-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</div>
					<span class="create-loading-text">Validating name</span>
				</div>
				<div class="create-loading-step" data-loading-step="category">
					<div class="create-loading-indicator">
						<span class="create-loading-spinner"></span>
						<svg class="create-loading-check" viewBox="0 0 16 16" focusable="false" aria-hidden="true">
							<circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
							<path d="M4.5 8.5l2 2 5-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</div>
					<span class="create-loading-text">Parsing category</span>
				</div>
				<div class="create-loading-step" data-loading-step="description">
					<div class="create-loading-indicator">
						<span class="create-loading-spinner"></span>
						<svg class="create-loading-check" viewBox="0 0 16 16" focusable="false" aria-hidden="true">
							<circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
							<path d="M4.5 8.5l2 2 5-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</div>
					<span class="create-loading-text">Processing description</span>
				</div>
			</div>
		</div>
	</div>
</div>
