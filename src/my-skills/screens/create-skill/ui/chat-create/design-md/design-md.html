<div class="design-md-screen" data-design-md-screen>
	<section class="design-md-panel is-active" data-design-step-panel="0">
		<div class="design-md-heading">
			<h1>Palette Colors</h1>
			<p>Pick the palette that will define your interface.</p>
		</div>

		<div class="design-md-options design-md-options--colors" aria-label="Design color options" data-design-options="color"></div>
	</section>

	<section class="design-md-panel" data-design-step-panel="1" hidden>
		<div class="design-md-heading">
			<h1>Typography</h1>
			<p>Choose the font style for headings, labels, and UI text.</p>
		</div>

		<div class="design-md-options design-md-options--typography" aria-label="Typography options" data-design-options="typography"></div>
	</section>

	<section class="design-md-panel" data-design-step-panel="2" hidden>
		<div class="design-md-heading">
			<h1>Choose Style</h1>
			<p>Pick the visual system your interface should follow.</p>
		</div>

		<div class="design-md-options" aria-label="Style options" data-design-options="style"></div>
	</section>

	<section class="design-md-panel design-md-summary" data-design-step-panel="3" hidden>
		<div class="design-md-heading">
			<h1>Review and create</h1>
			<p>Tap any card to bring it forward 😉.</p>
		</div>

		<div class="design-md-collage" data-design-collage>
			<button class="design-md-collage-card" data-collage-card="0" data-collage-depth="0" type="button">
				<span class="design-md-collage-badge">Color</span>
				<span class="design-md-collage-visual" data-collage-visual="color"></span>
				<span class="design-md-collage-name" data-design-summary="0"></span>
			</button>

			<button class="design-md-collage-card" data-collage-card="1" data-collage-depth="1" type="button">
				<span class="design-md-collage-badge">Typography</span>
				<span class="design-md-collage-visual" data-collage-visual="typography"></span>
				<span class="design-md-collage-name" data-design-summary="1"></span>
			</button>

			<button class="design-md-collage-card" data-collage-card="2" data-collage-depth="2" type="button">
				<span class="design-md-collage-badge">Style</span>
				<span class="design-md-collage-visual" data-collage-visual="style"></span>
				<span class="design-md-collage-name" data-design-summary="2"></span>
			</button>
		</div>

		<div class="design-md-file-row">
			<span class="design-md-file-dot"></span>
			<span class="design-md-file-label">DESIGN.md</span>
			<span class="design-md-file-status" data-design-file-status>Ready to write</span>
		</div>

		<button class="design-md-create" type="button" data-design-create>Create DESIGN.md</button>
	</section>
</div>
