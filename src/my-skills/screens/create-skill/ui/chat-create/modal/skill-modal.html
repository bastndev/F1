<div class="skill-modal-overlay" data-name-prompt-overlay>
	<div class="skill-modal-panel" data-name-prompt-panel>
		<div class="skill-modal-accent-bar"></div>

		<div class="skill-modal-header">
			<div class="skill-modal-template is-fast-active" role="group" aria-label="Skill template" data-name-prompt-template>
				<span class="skill-modal-template-slider" aria-hidden="true"></span>
				<button type="button" class="skill-modal-template-btn" data-template="base" aria-pressed="false" title="Create instantly — no extra steps">
					<svg viewBox="0 0 16 16" focusable="false" aria-hidden="true">
						<path d="M4 2.5h5.25L12 5.25v8.25H4z" />
						<path d="M9 2.75V5.5h2.75" />
					</svg>
					<span>Base</span>
				</button>
				<button type="button" class="skill-modal-template-btn is-active" data-template="fast" aria-pressed="true" title="Guided flow — pick category &amp; description">
					<svg viewBox="0 0 16 16" focusable="false" aria-hidden="true">
						<path d="M9 2.5 4.5 8.8H7l-.6 4.7L11 6.7H8.3z" />
					</svg>
					<span>Fast</span>
				</button>
			</div>
			<h2 class="skill-modal-title">Name your skill</h2>
			<p class="skill-modal-subtitle">Choose a unique identifier for your new skill</p>
		</div>

		<div class="skill-modal-body">
			<label class="skill-modal-field" for="name-prompt-input">
				<span class="skill-modal-field-icon" aria-hidden="true">
					<svg viewBox="0 0 16 16" focusable="false">
						<circle cx="7" cy="7" r="4.25" />
						<path d="m10.25 10.25 3 3" />
					</svg>
				</span>
				<input
					id="name-prompt-input"
					class="skill-modal-input"
					type="text"
					placeholder="my-skill-name"
					autocomplete="off"
					spellcheck="false"
					aria-label="Skill name"
					maxlength="30"
					data-name-prompt-input
				>
			</label>
			<div class="skill-modal-path-preview" data-name-prompt-path-preview>
				<span class="skill-modal-path-segment" data-name-prompt-path-target>.agents</span>
				<span class="skill-modal-path-sep">/</span>
				<span class="skill-modal-path-segment">skills</span>
				<span class="skill-modal-path-sep">/</span>
				<span class="skill-modal-path-name" data-name-prompt-path-name>skill-name</span>
			</div>
			<div class="skill-modal-hint" data-name-prompt-hint>
				<span class="skill-modal-hint-icon" aria-hidden="true" data-name-prompt-hint-icon></span>
				<span class="skill-modal-hint-text" data-name-prompt-hint-text>lowercase, numbers, hyphens</span>
				<span class="skill-modal-hint-counter" data-name-prompt-hint-counter></span>
			</div>
		</div>

		<div class="skill-modal-footer">
			<button class="skill-modal-cancel" type="button" data-name-prompt-cancel>Cancel</button>
			<button class="skill-modal-confirm" type="button" disabled data-name-prompt-confirm aria-disabled="true">
				<span class="skill-modal-confirm-text">Create</span>
				<span class="skill-modal-confirm-icon" aria-hidden="true">
					<svg viewBox="0 0 16 16" focusable="false">
						<path d="M3.5 8.25 6.4 11 12.5 5" />
					</svg>
				</span>
			</button>
		</div>
	</div>
</div>
