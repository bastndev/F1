<div class="create-mode-content search-mode-content" data-create-search-panel>
	<div class="create-search-state" data-create-search-empty>
		<div class="create-search-state-icon" aria-hidden="true">
			<svg viewBox="0 0 16 16" focusable="false">
				<circle cx="7" cy="7" r="4.25"/>
				<path d="m10.25 10.25 3 3"/>
			</svg>
		</div>
		<h2>Find project skills</h2>
		<p>Describe what you need, then press Send.</p>
	</div>

	<div class="create-search-results" data-create-search-results hidden>
		<div class="create-search-summary">
			<div>
				<span class="create-search-kicker" data-create-search-kicker>Recommended</span>
				<h2 data-create-search-title>Best skills for this project</h2>
			</div>
			<div class="create-search-techs" data-create-search-techs aria-label="Detected technologies">
				<span class="create-search-page-actions" data-create-search-page-actions hidden>
					<button class="create-search-page-button create-search-page-button--back" type="button" aria-label="Show previous marketplace results" data-create-search-page-back hidden>&lt;</button>
					<button class="create-search-page-button create-search-page-button--more" type="button" aria-label="Show more marketplace results" data-create-search-page-more hidden>&gt;</button>
				</span>
			</div>
		</div>

		<div class="create-search-status" data-create-search-status hidden></div>
		<div class="create-search-list" data-create-search-list></div>
	</div>
</div>
