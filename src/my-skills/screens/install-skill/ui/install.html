<div class="install-surface">

	<div class="install-header">
		<div class="install-header-row">
			<label class="install-search-box" for="install-search-input">
				<svg class="install-search-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
					<circle cx="6.5" cy="6.5" r="4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
					<path d="M10 10L13.5 13.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
				</svg>
				<input
					id="install-search-input"
					class="install-search-input"
					type="search"
					placeholder="Search skills..."
					autocomplete="off"
					spellcheck="false"
					aria-label="Search available skills"
				>
				<button id="install-search-clear" class="install-search-clear" type="button" aria-label="Clear search" hidden>
					<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
						<path d="M4.5 4.5l7 7M11.5 4.5l-7 7" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round"/>
					</svg>
				</button>
			</label>

			<button id="install-refine-btn" class="install-refine-btn" type="button" aria-label="Refine skills by category" aria-expanded="false" title="Refine skills">
				<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
					<path d="M1.5 3.5h5M9.5 3.5h5M6.5 3.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
					<path d="M1.5 8h5M9.5 8h5M6.5 8a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
					<path d="M1.5 12.5h5M9.5 12.5h5M6.5 12.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
				</svg>
			</button>
		</div>

		<div id="install-refine-bar" class="install-refine-bar" hidden></div>

		<div id="install-refine-panel" class="install-refine-panel" hidden></div>

		<div class="install-filters" role="tablist" aria-label="Filter skills">
			<button id="install-filter-all" class="install-filter active" type="button" role="tab" aria-selected="true" data-filter="all" aria-controls="install-panel-all">
				All Time
			</button>
			<button id="install-filter-trending" class="install-filter" type="button" role="tab" aria-selected="false" data-filter="trending" aria-controls="install-panel-trending">
				<span class="install-filter-label">Trending</span>
				<span class="install-filter-mode-slot" aria-hidden="true" title="Switch trending mode">
					<span class="install-filter-flame" data-trending-mode-indicator="flame">
						<svg viewBox="0 0 16 16" focusable="false">
							<path d="M8.4 14c-2.7 0-4.7-1.8-4.7-4.4 0-1.6.8-2.8 1.8-3.8.7-.8 1.1-1.7.9-3.1 1.5.6 2.7 1.8 3 3.5.6-.5.9-1.3.9-2.2 1.4 1 2.1 2.6 2.1 4.4 0 3.3-2 5.6-4 5.6Z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</span>
					<span class="install-filter-badge" data-trending-mode-indicator="24h">24h</span>
				</span>
			</button>
			<button id="install-filter-official" class="install-filter" type="button" role="tab" aria-selected="false" data-filter="official" aria-controls="install-panel-official">
				@ Official
			</button>
		</div>
	</div>

	<div id="install-panel-all" class="install-panel" role="tabpanel" aria-labelledby="install-filter-all">
		<!-- ALLTIME_PANEL -->
	</div>

	<div id="install-panel-trending" class="install-panel" role="tabpanel" aria-labelledby="install-filter-trending" aria-hidden="true" hidden>
		<!-- TRENDING_PANEL -->
	</div>

	<div id="install-panel-official" class="install-panel install-panel--official" role="tabpanel" aria-labelledby="install-filter-official" aria-hidden="true" hidden>
		<!-- OFFICIAL_PANEL -->
	</div>

	<div id="install-panel-search" class="install-panel" role="tabpanel" aria-hidden="true" hidden>
		<!-- SEARCH_PANEL -->
	</div>

</div>
