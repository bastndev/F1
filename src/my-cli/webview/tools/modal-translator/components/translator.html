<div class="translator-modal">
  <div class="translator-header">
    <div class="translator-header-left">
      <div class="translator-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-language">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M9 6.371c0 4.418 -2.239 6.629 -5 6.629" />
          <path d="M4 6.371h7" />
          <path d="M5 9c0 2.144 2.252 3.908 6 4" />
          <path d="M12 20l4 -9l4 9" />
          <path d="M19.1 18h-6.2" />
          <path d="M6.694 3l.793 .582" />
        </svg>
      </div>
      <div class="translator-title-group">
        <div class="translator-title">
          Translator
          <span class="translator-badge">PRO</span>
        </div>
        <div class="translator-subtitle-row">
          <div class="translator-subtitle">automatically translates terminal output to your language</div>
          <div class="translator-lang-row">
            <span class="lang-from">CLI</span>
            <span class="lang-arrow">→</span>
            <span class="lang-to"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="translator-header-actions">
      <button class="translator-close-btn" id="closeTranslatorBtn" aria-label="Close" title="Close (Esc)">esc</button>
    </div>
  </div>

  <div class="translator-body">
    <div class="translator-text" id="translatedText">
      the cli response translated to your language will appear here, clearly and organized.
    </div>
  </div>

  <div class="translator-divider"></div>

  <div class="translator-controls">
    <button class="translator-action-btn translator-copy" id="copyBtn" title="Copy" aria-label="Copy" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-copy" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M7 9.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666" />
        <path d="M4.012 16.737a2.005 2.005 0 0 1 -1.012 -1.737v-10c0 -1.1 .9 -2 2 -2h10c.75 0 1.158 .385 1.5 1" />
      </svg>
    </button>
    <div class="translator-voice-control" id="voiceControl">
      <button class="translator-action-btn translator-speak" id="speakBtn" title="Listen" aria-label="Listen" disabled>
        <span class="speak-idle">
          <i class="ti ti-volume-2" aria-hidden="true"></i>
          <span>Listen</span>
        </span>
        <span class="speak-stop" aria-hidden="true">
          <i class="ti ti-player-pause-filled"></i>
          <span>Pause</span>
        </span>
        <div class="translator-spectrum" id="audioSpectrum" aria-hidden="true">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
      </button>
      <button class="translator-action-btn translator-voice-extra" id="voiceExtraBtn" title="Stop voice" aria-label="Stop voice" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="icon icon-tabler icons-tabler-outline icon-tabler-player-stop" aria-hidden="true">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M5 7a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2l0 -10" />
        </svg>
      </button>
    </div>
    <div class="translator-controls-right">
      <button class="translator-auto-toggle" id="autoTranslateToggle" aria-pressed="false"
        title="Auto-translate when the panel opens (click to toggle)" aria-label="Auto-translate">
        <span class="translator-auto-dot" aria-hidden="true"></span>
        <i class="ti ti-bolt" aria-hidden="true"></i>
        <span class="translator-auto-label">auto</span>
      </button>
      <button class="translator-action-btn" id="translateBtn">
        <i class="ti ti-language" aria-hidden="true"></i>
        <span>Translate</span>
      </button>
    </div>
  </div>

  <div class="translator-footer">
    <div class="translator-model">
      <div class="model-dot"></div>
      <i class="ti ti-cpu" aria-hidden="true"></i>
      <span id="modelName">claude</span>
    </div>
    <span class="translator-status">ready</span>
  </div>
</div>
