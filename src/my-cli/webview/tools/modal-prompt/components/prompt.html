<div class="prompt-modal" role="dialog" aria-label="Prompt Enhancer">
  <!-- HEADER -->
  <div class="prompt-header">
    <div class="prompt-header-left">
      <div class="prompt-title">PROMPT</div>
      <div class="prompt-subtitle-row">
        <div class="prompt-subtitle">send a message to the active CLI session</div>
        <span class="prompt-lang-picker" id="langToggle"></span>
      </div>
    </div>
    <div class="prompt-header-actions">
      <button class="prompt-close-btn" id="closePromptBtn" aria-label="Close" title="Close (Esc)">esc</button>
    </div>
  </div>
  <!-- TOOLBAR: Pro button (left) + language toggles (right). The Pro button is
       always present, so English — which hides both toggles — can't collapse /
       jump the row height. -->
  <div class="prompt-toolbar">
    <div class="prompt-toolbar-pro">
      <button class="prompt-pro-btn" id="proBtn" type="button" title="Pro features">
        PRO <span class="prompt-beta">beta</span>
      </button>
    </div>
    <div class="prompt-toolbar-toggles">
      <button
        class="prompt-translate-toggle"
        id="translateToggle"
      aria-pressed="true"
      title="Auto-translate to English before sending (click to toggle)"
    >
      <span class="prompt-translate-dot" aria-hidden="true"></span>
      <i class="ti ti-language prompt-translate-icon" aria-hidden="true"></i>
      <i class="ti ti-loader-2 prompt-translate-spinner" aria-hidden="true"></i>
      <span class="prompt-translate-label">translate</span>
    </button>
    <button
      class="prompt-strict-toggle"
      id="strictToggle"
      aria-pressed="false"
      title="Strict accents: flag words missing tildes (click to toggle)"
    >
      <span class="prompt-strict-dot" aria-hidden="true"></span>
      <i class="ti ti-spell-check prompt-strict-icon" aria-hidden="true"></i>
      <span class="prompt-strict-label">strict</span>
    </button>
    </div>
  </div>
  <!-- BODY -->
  <div class="prompt-body">
    <div class="prompt-textarea-wrap">
      <div class="prompt-textarea-highlight" aria-hidden="true"></div>
      <!-- No hard maxlength: the 5000 limit applies to the *effective* length
           (typed text minus markers/@routes) and is enforced by the Run button. -->
      <textarea
        id="promptInput"
        class="prompt-textarea"
        placeholder="Select a language to start…"
      ></textarea>
      <span class="prompt-char-count" id="charCount">0/5000</span>
    </div>
    <!-- Chips are populated at mount with the skills installed in the
         workspace (.agents/skills + .claude/skills); hidden when none.
         One aggregate /skills #N token represents the selection. -->
    <div class="prompt-skills" hidden>
      <span class="prompt-skills-label">Skills:</span>
      <div class="prompt-tools" id="skillChips"></div>
    </div>
  </div>
  <!-- DIVIDER -->
  <div class="prompt-divider"></div>
  <!-- FOOTER -->
  <div class="prompt-footer">
    <div class="prompt-footer-info">
      <span class="prompt-session-dot" id="sessionDot"></span>
      <i class="ti ti-cpu" aria-hidden="true"></i> CLI
    </div>
    <div class="prompt-run-wrap">
      <span class="prompt-run-hint">Ctrl + Enter</span>
      <button class="prompt-run-btn" id="runBtn" data-action="both" disabled>
        <i class="ti ti-send" aria-hidden="true"></i>
        <span>Execute</span>
      </button>
    </div>
  </div>
</div>
