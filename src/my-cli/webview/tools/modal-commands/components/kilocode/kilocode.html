<div class="commands-group" data-category="Essentials">
	<div class="commands-group-label">Essentials</div>
	<button class="commands-row" type="button" data-cmd="/models">
		<span class="commands-tag">/models</span>
		<span class="commands-desc">Switch model.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/status">
		<span class="commands-tag">/status</span>
		<span class="commands-desc">View status.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/new">
		<span class="commands-tag">/new</span>
		<span class="commands-desc">Start a new session.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/sessions">
		<span class="commands-tag">/sessions</span>
		<span class="commands-desc">Switch session.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/review">
		<span class="commands-tag">/review [target]</span>
		<span class="commands-desc">Review changes. <span class="commands-alias">commit, branch, or PR — defaults to uncommitted</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/agents">
		<span class="commands-tag">/agents</span>
		<span class="commands-desc">Switch agent.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/skills">
		<span class="commands-tag">/skills</span>
		<span class="commands-desc">Manage skills.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/help">
		<span class="commands-tag">/help</span>
		<span class="commands-desc">Show help.</span>
	</button>
</div>

<div class="commands-group" data-category="Session">
	<div class="commands-group-label">Session</div>
	<button class="commands-row" type="button" data-cmd="/process">
		<span class="commands-tag">/process</span>
		<span class="commands-desc">List and manage tracked background processes.</span>
	</button>
</div>

<div class="commands-group" data-category="Model & Provider">
	<div class="commands-group-label">Model &amp; Provider</div>
	<button class="commands-row" type="button" data-cmd="/connect">
		<span class="commands-tag">/connect</span>
		<span class="commands-desc">Connect a provider.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/remote">
		<span class="commands-tag">/remote</span>
		<span class="commands-desc">Enable or disable remote session relay.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/profile">
		<span class="commands-tag">/profile</span>
		<span class="commands-desc">View your Kilo Gateway profile.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/teams">
		<span class="commands-tag">/teams</span>
		<span class="commands-desc">Switch between Kilo Gateway teams.</span>
	</button>
</div>

<div class="commands-group" data-category="Agents & Skills">
	<div class="commands-group-label">Agents &amp; Skills</div>
	<button class="commands-row" type="button" data-cmd="/kiloclaw">
		<span class="commands-tag">/kiloclaw</span>
		<span class="commands-desc">Open the KiloClaw chat &amp; dashboard.</span>
	</button>
</div>

<div class="commands-group" data-category="Code Review">
	<div class="commands-group-label">Code Review</div>
	<button class="commands-row" type="button" data-cmd="/init">
		<span class="commands-tag">/init</span>
		<span class="commands-desc">Guided AGENTS.md setup.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/local-review">
		<span class="commands-tag">/local-review [base]</span>
		<span class="commands-desc">Run a local review of the current branch. <span class="commands-alias">optional base</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/local-review-uncommitted">
		<span class="commands-tag">/local-review-uncommitted</span>
		<span class="commands-desc">Run a local review of uncommitted changes.</span>
	</button>
</div>

<div class="commands-group" data-category="Config">
	<div class="commands-group-label">Config</div>
	<button class="commands-row" type="button" data-cmd="/editor">
		<span class="commands-tag">/editor</span>
		<span class="commands-desc">Open the external editor.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/themes">
		<span class="commands-tag">/themes</span>
		<span class="commands-desc">Switch theme.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/mcps">
		<span class="commands-tag">/mcps</span>
		<span class="commands-desc">Toggle MCP servers.</span>
	</button>
</div>

<div class="commands-group" data-category="Other">
	<div class="commands-group-label">Other</div>
	<button class="commands-row" type="button" data-cmd="/exit">
		<span class="commands-tag">/exit</span>
		<span class="commands-desc">Exit the app.</span>
	</button>
</div>
