<div class="commands-group" data-category="Essentials">
	<div class="commands-group-label">Essentials</div>
	<button class="commands-row" type="button" data-cmd="/model">
		<span class="commands-tag">/model</span>
		<span class="commands-desc">Switch the active model.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/usage">
		<span class="commands-tag">/usage</span>
		<span class="commands-desc">View credit usage or manage billing.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/compact">
		<span class="commands-tag">/compact</span>
		<span class="commands-desc">Compact conversation history.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/context">
		<span class="commands-tag">/context</span>
		<span class="commands-desc">View context usage.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/plan">
		<span class="commands-tag">/plan</span>
		<span class="commands-desc">Enter plan mode.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/new">
		<span class="commands-tag">/new</span>
		<span class="commands-desc">Start a new session.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/resume">
		<span class="commands-tag">/resume</span>
		<span class="commands-desc">Resume a previous session.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/sessions">
		<span class="commands-tag">/sessions</span>
		<span class="commands-desc">Switch, rename, or close active sessions.</span>
	</button>
</div>

<div class="commands-group" data-category="Session">
	<div class="commands-group-label">Session</div>
	<button class="commands-row" type="button" data-cmd="/home">
		<span class="commands-tag">/home</span>
		<span class="commands-desc">Return to the welcome screen.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/fork">
		<span class="commands-tag">/fork</span>
		<span class="commands-desc">Branch the current session into a peer agent.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/rename">
		<span class="commands-tag">/rename</span>
		<span class="commands-desc">Rename the current session.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/session-info">
		<span class="commands-tag">/session-info</span>
		<span class="commands-desc">Show session info.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/dashboard">
		<span class="commands-tag">/dashboard</span>
		<span class="commands-desc">Open the Agent Dashboard — a fullscreen overview of every running session.</span>
	</button>
</div>

<div class="commands-group" data-category="Conversation & Context">
	<div class="commands-group-label">Conversation &amp; Context</div>
	<button class="commands-row" type="button" data-cmd="/copy">
		<span class="commands-tag">/copy [N]</span>
		<span class="commands-desc">Copy last response to clipboard. <span class="commands-alias">/copy N for Nth-latest</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/find">
		<span class="commands-tag">/find</span>
		<span class="commands-desc">Search the conversation scrollback.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/export">
		<span class="commands-tag">/export</span>
		<span class="commands-desc">Export the current conversation to a file or clipboard.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/recap">
		<span class="commands-tag">/recap</span>
		<span class="commands-desc">Summarize the session so far.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/rewind">
		<span class="commands-tag">/rewind</span>
		<span class="commands-desc">Rewind to a previous turn.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/btw">
		<span class="commands-tag">/btw [question]</span>
		<span class="commands-desc">Ask a side question without interrupting.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/remember">
		<span class="commands-tag">/remember</span>
		<span class="commands-desc">Save a memory note.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/view-plan">
		<span class="commands-tag">/view-plan</span>
		<span class="commands-desc">View the current plan.</span>
	</button>
</div>

<div class="commands-group" data-category="Model & Agents">
	<div class="commands-group-label">Model &amp; Agents</div>
	<button class="commands-row" type="button" data-cmd="/always-approve">
		<span class="commands-tag">/always-approve</span>
		<span class="commands-desc">Toggle always-approve mode. <span class="commands-alias">skip all permission prompts</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/config-agents">
		<span class="commands-tag">/config-agents</span>
		<span class="commands-desc">Manage agent definitions.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/personas">
		<span class="commands-tag">/personas</span>
		<span class="commands-desc">Manage personas (create, edit, delete).</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/loop">
		<span class="commands-tag">/loop [interval]</span>
		<span class="commands-desc">Run a prompt on a recurring interval.</span>
	</button>
</div>

<div class="commands-group" data-category="Interface">
	<div class="commands-group-label">Interface</div>
	<button class="commands-row" type="button" data-cmd="/multiline">
		<span class="commands-tag">/multiline</span>
		<span class="commands-desc">Toggle multiline input mode. <span class="commands-alias">swaps Enter and Shift+Enter</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/compact-mode">
		<span class="commands-tag">/compact-mode</span>
		<span class="commands-desc">Toggle compact UI. <span class="commands-alias">less padding, more content</span></span>
	</button>
	<button class="commands-row" type="button" data-cmd="/vim-mode">
		<span class="commands-tag">/vim-mode</span>
		<span class="commands-desc">Toggle vim-style scrollback keybindings.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/theme">
		<span class="commands-tag">/theme</span>
		<span class="commands-desc">Switch the color theme.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/timestamps">
		<span class="commands-tag">/timestamps</span>
		<span class="commands-desc">Toggle message timestamps on/off.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/terminal-setup">
		<span class="commands-tag">/terminal-setup</span>
		<span class="commands-desc">Check terminal and clipboard setup.</span>
	</button>
	<button class="commands-row" type="button" data-cmd="/settings">
		<span class="commands-tag">/settings</span>
		<span class="commands-desc">Open the settings modal.</span>
	</button>
