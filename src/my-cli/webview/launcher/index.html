<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="${contentSecurityPolicy}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CLI Hub</title>
	<link href="${styleUri}" rel="stylesheet">
</head>
<body>
	<div id="launcher-view" class="container">
			<pre class="logo"><img class="logo-bolt" src="${logoUri}" alt="" aria-hidden="true" width="14" height="16">  ____ _     ___   <span class="hub-text">  _   _       _     </span>
 / ___| |   |_ _|  <span class="hub-text"> | | | |_   _| |__  </span>
| |   | |    | |   <span class="hub-text"> | |_| | | | | '_ \ </span>
| |___| |___ | |   <span class="hub-text"> |  _  | |_| | |_) |</span>
 \____|_____|___|  <span class="hub-text"> |_| |_|\__,_|_.__/ </span>
			</pre>

		<div class="input-container">
			<div class="input-wrapper">
				<input id="cli-input" type="text" placeholder="Type or select one of the options..." autocomplete="off" spellcheck="false" autofocus>
			</div>
			<div id="selected-option" class="input-footer" role="button" tabindex="0">
				<span class="highlight">Build</span> &middot; <span id="ai-model-name" class="animated-text">OpenCode</span><span id="secondary-suggestions" class="secondary-suggestions"></span>
			</div>
		</div>

		<div id="agent-icon-palette" class="agent-icon-palette" aria-label="CLI agents" aria-hidden="true"></div>

		<div class="shortcuts">
			<strong>Tab</strong> agents &nbsp;<span>| </span>&nbsp;<strong>Alt+CapsLock</strong> Side Panel
		</div>
	</div>

	<button id="cli-tutorial-button" class="cli-tutorial-button" type="button" aria-label="Open CLI Hub tutorial">
		<span class="cli-tutorial-button-icon" aria-hidden="true">?</span>
		<span>Tutorial</span>
	</button>

	<div class="workspace-path">${workspacePath}</div>

	<script id="cli-models" type="application/json" nonce="${nonce}">
		${cliModels}
	</script>
	<script id="launcher-state-session" type="application/json" nonce="${nonce}">
		${launcherStateSessionId}
	</script>
	<script nonce="${nonce}" src="${scriptUri}"></script>
</body>
</html>
