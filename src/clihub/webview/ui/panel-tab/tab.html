<div class="layout-left">
	<div class="agent-tab-shell">
		<div class="agent-tab-header">
			<div class="agent-picker">
				<button
					id="cli-agent-button"
					class="agent-picker-button"
					type="button"
					aria-label="CLI agent"
					aria-haspopup="listbox"
					aria-expanded="false"
					aria-controls="cli-agent-menu"
				>
					<span id="cli-agent-label" class="agent-picker-label">Loading CLI</span>
					<svg class="agent-picker-chevron" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
						<path d="M4.5 6.25 8 9.75l3.5-3.5" />
					</svg>
				</button>
				<div id="cli-agent-menu" class="agent-picker-menu" role="listbox" aria-label="CLI agent" hidden></div>
			</div>
			<div class="agent-header-actions">
				<button
					id="cli-tools-button"
					class="agent-tools-button"
					type="button"
					title="CLI tools"
					aria-label="CLI tools"
					aria-haspopup="menu"
					aria-expanded="false"
					aria-controls="cli-tools-popover"
				>
					<svg class="agent-tools-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
						<path d="M3 4.5h10M3 11.5h10M6 2.75v3.5M10 9.75v3.5" />
						<circle cx="6" cy="4.5" r="1.35" />
						<circle cx="10" cy="11.5" r="1.35" />
					</svg>
				</button>
				<button
					id="cli-create-button"
					class="agent-new-button"
					type="button"
					title="New CLI"
					aria-label="New CLI"
				>
					<span id="cli-create-button-label" class="agent-new-button-label" aria-hidden="true">+</span>
				</button>
			</div>
		</div>
		<!-- CLI Tools -->
		<div id="cli-tools-popover" class="agent-tools-popover" role="menu" aria-label="CLI tools" hidden>
			<div class="agent-tools-section">
				<div class="agent-tools-label">Tools CLI</div>

				<button class="agent-tools-item" type="button" role="menuitem" data-tool="prompt">
					<span class="agent-tools-item-icon" aria-hidden="true">P</span>
					<span class="agent-tools-item-text">Prompt</span>
					<span class="agent-tools-item-shortcut">shift+f1</span>
				</button>

				<label class="agent-tools-toggle">
					<span class="agent-tools-toggle-copy">
						<span class="agent-tools-toggle-title">Prompt filter</span>
						<span class="agent-tools-toggle-subtitle">open on terminal click</span>
					</span>
					<input id="cli-prompt-filter-toggle" class="agent-tools-toggle-input" type="checkbox">
					<span class="agent-tools-toggle-track" aria-hidden="true">
						<span class="agent-tools-toggle-thumb"></span>
					</span>
				</label>

				<button class="agent-tools-item" type="button" role="menuitem" data-tool="translate">
					<span class="agent-tools-item-icon" aria-hidden="true">T</span>
					<span class="agent-tools-item-text">Translator</span>
					<span class="agent-tools-item-shortcut">shift+f2</span>
				</button>

				<div class="agent-tools-divider"></div>

				<button class="agent-tools-item" type="button" role="menuitem" data-tool="keymaps">
					<span class="agent-tools-item-icon" aria-hidden="true">K</span>
					<span class="agent-tools-item-text">Keymaps</span>
					<span class="agent-tools-item-shortcut">shift+f3</span>
				</button>
			</div>
		</div>
		<div id="cli-session-list" class="agent-session-list" role="listbox" aria-label="Open CLI sessions"></div>
	</div>
</div>
