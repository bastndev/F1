<div class="layout-right">
	<div class="cli-terminal-shell">
		<div class="cli-terminal-header">
			<div class="cli-terminal-heading">
				<div id="cli-terminal-label" class="cli-terminal-label">${selectedAgent}</div>
				<div id="cli-terminal-status" class="cli-terminal-status">${workspacePath}</div>
			</div>
			<div id="cli-terminal-badge" class="cli-terminal-badge">CLI</div>
		</div>
		<div id="cli-terminal-stack" class="cli-terminal-stack" aria-label="CLI session"></div>
		<div id="cli-empty-state" class="cli-empty-state">No CLI session selected</div>
	</div>

	<!-- Tools Modal Overlay (managed by panel-terminal/tools-cli) -->
	<div id="cli-tools-modal" class="cli-tools-modal" hidden>
		<div class="cli-tools-modal-backdrop"></div>
		<div class="cli-tools-modal-content" id="cli-tools-modal-content"></div>
	</div>
</div>
