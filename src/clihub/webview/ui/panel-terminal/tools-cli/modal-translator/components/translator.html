<div class="translator-modal">
  <div class="translator-header">
    <div class="translator-header-left">
      <div class="translator-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-language">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M9 6.371c0 4.418 -2.239 6.629 -5 6.629" />
          <path d="M4 6.371h7" />
          <path d="M5 9c0 2.144 2.252 3.908 6 4" />
          <path d="M12 20l4 -9l4 9" />
          <path d="M19.1 18h-6.2" />
          <path d="M6.694 3l.793 .582" />
        </svg>
      </div>
      <div class="translator-title-group">
        <div class="translator-title">
          Translator
          <span class="translator-badge">PRO</span>
        </div>
        <div class="translator-subtitle">cli response translation</div>
      </div>
    </div>
    <div class="translator-lang-row">
      <span class="lang-from">CLI</span>
      <span class="lang-arrow">→</span>
      <div class="lang-selector" id="langSelector">
        <button class="lang-option active" data-lang="es">Spanish</button>
      </div>
      <button class="add-lang-btn" id="addLangBtn" title="Add language">+</button>
    </div>
  </div>

  <div class="translator-body">
    <div class="translator-text" id="translatedText">
      the cli response translated to your language will appear here, clearly and organized.
    </div>
  </div>

  <div class="translator-divider"></div>

  <div class="translator-controls">
    <button class="translator-action-btn" id="copyBtn">
      <i class="ti ti-copy" aria-hidden="true"></i>
      <span>Copy</span>
    </button>
    <div class="translator-controls-right">
      <span class="voice-label">Voice</span>
      <span class="voice-name">Nova</span>

      <button class="translator-action-btn translator-speak" id="speakBtn">
        <i class="ti ti-volume-2" aria-hidden="true"></i>
        <span>Listen</span>
      </button>
      <div class="translator-spectrum" id="audioSpectrum" aria-hidden="true">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>
  </div>

  <div class="translator-footer">
    <div class="translator-model">
      <div class="model-dot"></div>
      <i class="ti ti-cpu" aria-hidden="true"></i>
      <span id="modelName">claude</span>
    </div>
    <span class="translator-status">ready</span>
  </div>
</div>
