<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CLI Hub</title>
	<link href="${styleUri}" rel="stylesheet">
</head>
<body>
	<div class="container">
		<pre class="logo">
  ____ _     ___   <span class="hub-text">  _   _       _     </span>
 / ___| |   |_ _|  <span class="hub-text"> | | | |_   _| |__  </span>
| |   | |    | |   <span class="hub-text"> | |_| | | | | '_ \ </span>
| |___| |___ | |   <span class="hub-text"> |  _  | |_| | |_) |</span>
 \____|_____|___|  <span class="hub-text"> |_| |_|\__,_|_.__/ </span>
		</pre>
		
		<div class="input-container">
			<div class="input-wrapper">
				<input type="text" placeholder='Type or select one of the options...'>
			</div>
			<div class="input-footer">
				<span class="highlight">Build</span> &middot; <span id="ai-model-name" class="animated-text">OpenCode</span>
			</div>
		</div>
		
		<div class="shortcuts">
			<strong>Tab</strong> agents &nbsp;&nbsp; <strong>Shift+F1</strong> right panel
		</div>
	</div>

	<script>
		const models = [
  		  "OpenCode",
  		  "Claude Code",
  		  "Codex CLI",
  		  "Gemini CLI",
  		  "Aider",
  		  "GitHub Copilot CLI",
  		  "Cline",
  		  "Kiro CLI",
  		  "Goose",
  		  "Amp",
  		  "Continue CLI",
  		  "Kilo Code",
  		  "Tabnine CLI",
  		  "Pi"
		];
	
		let currentIndex = 0;
		const textElement = document.getElementById('ai-model-name');
	
		// Change text every 3.8s with fade animation
		setInterval(() => {
			textElement.style.opacity = 0;
		
			setTimeout(() => {
				currentIndex = (currentIndex + 1) % models.length;
				textElement.textContent = models[currentIndex];
				textElement.style.opacity = 1;
			}, 400);
		}, 3800);
	</script>
</body>
</html>
